[mypy]
ignore_missing_imports = True
plugins = sqlalchemy.ext.mypy.plugin
disallow_untyped_defs = True
disallow_incomplete_defs = True

[mypy-walks.models]
# Flask-SQLAlchemy's db.Model is dynamically generated; mypy can't resolve it
disable_error_code = name-defined

[mypy-hills.models]
disable_error_code = name-defined

[mypy-logs.models]
disable_error_code = name-defined

[mypy-tests.*]
ignore_errors = True
